<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 資產管家 V1.1 - 智能識別</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .upload-card { backdrop-filter: blur(16px); background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        input[type="text"]:focus { border-color: #60a5fa; outline: none; box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.2); }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white font-sans p-6">
    <div class="max-w-md mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">AI 資產管家</h1>
            <p class="text-gray-400 mt-2">V1.1 精確識別與手動校正</p>
        </header>

        <!-- 1. 上傳區 -->
        <div id="step-upload" class="upload-card rounded-3xl p-8 text-center">
            <div class="mb-6">
                <div class="w-20 h-20 bg-blue-500 bg-opacity-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-10 h-10 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
                <p class="text-lg font-bold">上傳庫存截圖</p>
                <p class="text-sm text-gray-500 mt-1">自動偵測美股/台股數據</p>
            </div>
            
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <button onclick="document.getElementById('file-input').click()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition duration-300 shadow-lg mb-4">
                選擇圖片 / 拍照
            </button>
            <p class="text-xs text-gray-500 underline">圖片在識別完成後將自動從伺服器刪除</p>
        </div>

        <!-- 2. 辨識中 -->
        <div id="step-loading" class="hidden upload-card rounded-3xl p-12 text-center">
            <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-blue-500 mx-auto mb-6"></div>
            <p class="text-lg font-bold" id="loading-text">AI 正在深度解析截圖...</p>
            <p class="text-sm text-gray-400 mt-2">正在提取 Symbol 與 Qty</p>
        </div>

        <!-- 3. 結果確認區 -->
        <div id="step-result" class="hidden upload-card rounded-3xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold flex items-center">
                    <span class="bg-green-500 w-2 h-6 rounded-full mr-3"></span>
                    請確認數據
                </h2>
                <span class="text-xs bg-white bg-opacity-10 px-2 py-1 rounded">可直接修改數字</span>
            </div>
            
            <div id="asset-list" class="space-y-3 max-h-96 overflow-y-auto mb-6 pr-2">
                <!-- 動態注入可編輯的資產項目 -->
            </div>

            <div class="flex gap-3">
                <button onclick="resetApp()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-4 rounded-2xl transition">
                    重新上傳
                </button>
                <button onclick="syncToSheet()" class="flex-2 w-2/3 bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl transition shadow-lg">
                    確認並同步
                </button>
            </div>
        </div>

        <footer class="mt-12 text-center text-xs text-gray-600">
            <p>© 2026 AI Asset Butler V1.1. Built by Felix.</p>
        </footer>
    </div>

    <script>
        function resetApp() {
            document.getElementById('step-upload').classList.remove('hidden');
            document.getElementById('step-result').classList.add('hidden');
            document.getElementById('step-loading').classList.add('hidden');
        }

        document.getElementById('file-input').onchange = function(e) {
            document.getElementById('step-upload').classList.add('hidden');
            document.getElementById('step-loading').classList.remove('hidden');
            
            // 模擬真實識別這張 Schwab 截圖的過程
            setTimeout(() => {
                document.getElementById('step-loading').classList.add('hidden');
                document.getElementById('step-result').classList.remove('hidden');
                renderAssets();
            }, 2000);
        };

        function renderAssets() {
            const list = document.getElementById('asset-list');
            // 這次精確反映你發送的 Schwab 截圖數據
            const parsedData = [
                { ticker: "SMH", qty: "75.0686", price: "$395.35" },
                { ticker: "QQQ", qty: "44.4344", price: "$608.91" },
                { ticker: "TSM", qty: "46", price: "$353.86" },
                { ticker: "BOXX", qty: "93", price: "$115.86" },
                { ticker: "TSLA", qty: "26", price: "$405.55" },
                { ticker: "QLD", qty: "41", price: "$68.26" },
                { ticker: "AAPL", qty: "10", price: "$260.29" },
                { ticker: "IGV", qty: "18", price: "$87.62" },
                { ticker: "EIX", qty: "14", price: "$71.22" },
                { ticker: "NVDA", qty: "4", price: "$183.34" },
                { ticker: "QQQI", qty: "2", price: "$52.53" }
            ];
            
            list.innerHTML = parsedData.map((item, idx) => `
                <div class="bg-white bg-opacity-5 p-4 rounded-xl border border-white border-opacity-5">
                    <div class="flex justify-between items-center mb-2">
                        <input type="text" value="${item.ticker}" class="bg-transparent font-bold text-blue-400 w-20">
                        <span class="text-xs text-gray-500">市價: ${item.price}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-400 uppercase tracking-widest font-semibold">Quantity</span>
                        <div class="flex items-center">
                            <input type="text" value="${item.qty}" class="bg-gray-800 rounded px-2 py-1 text-right font-mono font-bold text-green-400 w-28 border border-white border-opacity-10">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function syncToSheet() {
            alert('同步成功！11 筆資產數據已寫入 Google Sheets。');
            resetApp();
        }
    </script>
</body>
</html>
