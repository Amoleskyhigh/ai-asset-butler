<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 資產管家 V1.3 - 智能對位版</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .upload-card { backdrop-filter: blur(16px); background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        .success-animation { animation: scaleIn 0.3s ease-out; }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        input[type="text"] { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 4px 8px; color: #fff; }
        input[type="text"]:focus { border-color: #60a5fa; outline: none; }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white font-sans p-4">
    <div class="max-w-md mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-green-400">AI 資產管家</h1>
            <p class="text-gray-400 mt-2">V1.3 跨平台智能識別 (台股/美股)</p>
        </header>

        <!-- Step 1: Upload -->
        <div id="step-upload" class="upload-card rounded-3xl p-8 text-center">
            <div class="mb-6">
                <div class="w-20 h-20 bg-blue-500 bg-opacity-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-10 h-10 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <p class="text-lg font-bold">請上傳您的資產截圖</p>
                <p class="text-sm text-gray-500 mt-1">AI 將自動判斷券商類型與幣別</p>
            </div>
            
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <button onclick="document.getElementById('file-input').click()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-bold shadow-lg mb-4">
                選擇圖片 (美股/台股)
            </button>
            <p class="text-xs text-gray-500 italic">"Security by Design: 數據僅存放在您的 Google Sheets"</p>
        </div>

        <!-- Step 2: Loading -->
        <div id="step-loading" class="hidden upload-card rounded-3xl p-12 text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-blue-500 mx-auto mb-6"></div>
            <p id="loading-text" class="text-lg font-medium">AI 正在深度解析圖表...</p>
        </div>

        <!-- Step 3: Result Review -->
        <div id="step-result" class="hidden upload-card rounded-3xl p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">識別結果核對</h2>
                <button onclick="addNewRow()" class="text-xs bg-blue-500 bg-opacity-20 text-blue-300 px-3 py-1 rounded-lg border border-blue-500 border-opacity-30">+ 新增項目</button>
            </div>
            
            <div id="asset-container" class="space-y-3 max-h-96 overflow-y-auto mb-6 pr-1">
                <!-- Assets will be injected here -->
            </div>

            <div class="flex gap-2">
                <button onclick="resetApp()" class="flex-1 bg-gray-800 py-4 rounded-2xl text-sm font-bold">重選圖片</button>
                <button onclick="syncToSheet()" class="flex-2 w-2/3 bg-green-600 py-4 rounded-2xl font-bold shadow-xl">確認並同步數據</button>
            </div>
        </div>

        <!-- Step 4: Final Success -->
        <div id="step-success" class="hidden upload-card rounded-3xl p-8 text-center success-animation">
            <div class="w-16 h-16 bg-green-500 bg-opacity-20 rounded-full flex items-center justify-center mx-auto mb-6 text-green-400 text-3xl">✓</div>
            <h2 class="text-2xl font-bold mb-2">已成功同步！</h2>
            <p class="text-gray-400 text-sm mb-8">數據已寫入您的 Google Sheets。<br>所有截圖已從記憶體中抹除。</p>
            <a href="https://docs.google.com/spreadsheets/d/1kWYzTaOXvVdn6utVQ-C87pyX30vfYn7_R4c2QjHSMMA/edit" target="_blank" class="block w-full bg-white text-gray-900 font-bold py-4 rounded-2xl shadow-xl mb-4">
                打開 Google 試算表
            </a>
            <button onclick="resetApp()" class="text-blue-400 text-sm">繼續處理下一個帳戶</button>
        </div>

        <footer class="mt-8 text-center text-[10px] text-gray-600 uppercase tracking-widest">
            Powered by Antigravity AI Engine
        </footer>
    </div>

    <script>
        const MOCK_US = [
            { t: "SMH", q: "75.0686", p: "$395.35" }, { t: "QQQ", q: "44.4344", p: "$608.91" }, 
            { t: "TSM", q: "46", p: "$353.86" }, { t: "BOXX", q: "93", p: "$115.86" },
            { t: "TSLA", q: "26", p: "$405.55" }, { t: "AAPL", q: "10", p: "$260.29" },
            { t: "NVDA", q: "4", p: "$183.34" }, { t: "QQQI", q: "2", p: "$52.53" }
        ];
        const MOCK_TW = [
            { t: "00662", n: "富邦NASDAQ", q: "21,730" }, { t: "00670L", n: "富邦NASDAQ正2", q: "4,000" },
            { t: "00830", n: "國泰費半", q: "1,000" }, { t: "00864B", n: "中信公債0-1", q: "12,000" },
            { t: "00719B", n: "國泰短期公債", q: "3,530" }, { t: "5906", n: "台南-KY", q: "183" }
        ];

        function resetApp() {
            location.reload();
        }

        document.getElementById('file-input').onchange = function(e) {
            const fileName = e.target.files[0].name.toLowerCase();
            document.getElementById('step-upload').classList.add('hidden');
            document.getElementById('step-loading').classList.remove('hidden');
            
            // 模擬偵測邏輯：判斷圖片源 (真實版會用 AI Vision 做這步)
            setTimeout(() => {
                document.getElementById('step-loading').classList.add('hidden');
                document.getElementById('step-result').classList.remove('hidden');
                // 為了讓 Felix 測試有感，這裡根據圖片特徵做簡單模擬
                // 真實情況下我們會讀取圖片二進位數據傳給後端
                const isTW = confirm("AI 偵測到這可能是「台灣券商」截圖？\n(OK=台股, Cancel=美股)");
                renderAssets(isTW ? MOCK_TW : MOCK_US, isTW);
            }, 1800);
        };

        function renderAssets(data, isTW) {
            const container = document.getElementById('asset-container');
            container.innerHTML = data.map(item => `
                <div class="bg-gray-800 bg-opacity-40 p-4 rounded-2xl border border-white border-opacity-5 flex justify-between items-center">
                    <div class="flex flex-col gap-1">
                        <input type="text" value="${item.t}" class="w-20 font-bold text-blue-400 text-sm">
                        <span class="text-[10px] text-gray-500 font-medium">${isTW ? (item.n || '台股標的') : (item.p || 'US Asset')}</span>
                    </div>
                    <div class="text-right">
                        <label class="text-[9px] text-gray-500 block uppercase mb-1">Quantity</label>
                        <input type="text" value="${item.q}" class="w-24 text-right font-mono text-green-400 font-bold">
                    </div>
                </div>
            `).join('');
        }

        function addNewRow() {
            const container = document.getElementById('asset-container');
            const div = document.createElement('div');
            div.className = "bg-gray-800 bg-opacity-40 p-4 rounded-2xl border border-blue-500 border-opacity-20 flex justify-between items-center success-animation";
            div.innerHTML = `
                <div class="flex flex-col gap-1">
                    <input type="text" placeholder="代號" class="w-20 font-bold text-blue-400 text-sm">
                    <span class="text-[10px] text-gray-500 font-medium">手動新增</span>
                </div>
                <div class="text-right">
                    <label class="text-[9px] text-gray-500 block uppercase mb-1">Quantity</label>
                    <input type="text" placeholder="0" class="w-24 text-right font-mono text-green-400 font-bold">
                </div>
            `;
            container.prepend(div);
        }

        function syncToSheet() {
            document.getElementById('step-result').classList.add('hidden');
            document.getElementById('step-loading').classList.remove('hidden');
            document.getElementById('loading-text').innerText = "正在加密並寫入試算表...";
            
            setTimeout(() => {
                document.getElementById('step-loading').classList.add('hidden');
                document.getElementById('step-success').classList.remove('hidden');
            }, 1200);
        }
    </script>
</body>
</html>
