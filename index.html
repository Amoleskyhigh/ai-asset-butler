<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Asset Butler v3.0 - Core Brain</title>
    <script src="https://accounts.google.com/gsi/client" onload="initTokenClient()"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { display: none; }
        .loading.active { display: flex; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">
    <div class="max-w-4xl mx-auto py-12 px-4">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-blue-700 mb-2">AI Asset Butler v3.0</h1>
            <p class="text-slate-500">Google OAuth & Gemini Vision Production Version</p>
        </header>

        <!-- Step 1: Login -->
        <div id="login-section" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 mb-6 text-center">
            <h2 class="text-xl font-bold mb-4">Step 1: 授權 Google 帳號</h2>
            <p class="text-sm text-slate-500 mb-6">我們需要存取您的雲端硬碟以建立試算表，並使用 Gemini 進行辨識。</p>
            <button id="auth-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg transition-all shadow-md">
                登入 Google 並開始
            </button>
            <div id="user-info" class="mt-4 hidden">
                <p class="text-green-600 font-medium">✓ 已授權存取</p>
            </div>
        </div>

        <!-- Step 2: Spreadsheet Setup -->
        <div id="setup-section" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 mb-6 opacity-50 pointer-events-none transition-all">
            <h2 class="text-xl font-bold mb-4">Step 2: 初始化試算表</h2>
            <div id="spreadsheet-status" class="flex items-center space-x-3 text-slate-600">
                <div class="animate-spin rounded-full h-4 w-4 border-2 border-blue-500 border-t-transparent hidden" id="setup-loader"></div>
                <p id="setup-text">請先完成登入</p>
            </div>
            <div id="spreadsheet-link" class="mt-4 hidden">
                <a href="#" target="_blank" class="text-blue-600 hover:underline text-sm font-medium">開啟 AI_Asset_Butler_Holdings 試算表</a>
            </div>
        </div>

        <!-- Step 3: Recognition -->
        <div id="recognition-section" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 mb-6 opacity-50 pointer-events-none transition-all">
            <h2 class="text-xl font-bold mb-4">Step 3: 上傳資產截圖 (Gemini Vision)</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <input type="file" id="image-upload" accept="image/*" class="block w-full text-sm text-slate-500
                    file:mr-4 file:py-2 file:px-4
                    file:rounded-full file:border-0
                    file:text-sm file:font-semibold
                    file:bg-blue-50 file:text-blue-700
                    hover:file:bg-blue-100
                ">
            </div>
            <div id="preview-container" class="mb-4 hidden">
                <img id="image-preview" src="#" alt="Preview" class="max-h-64 rounded-lg border border-slate-200 shadow-inner">
            </div>
            <button id="recognize-btn" class="w-full bg-slate-800 hover:bg-black text-white font-bold py-3 px-6 rounded-xl transition-all disabled:opacity-50">
                開始 AI 辨識
            </button>
            
            <div id="recognition-result" class="mt-6 hidden">
                <h3 class="font-semibold text-slate-700 mb-2">辨識結果摘要：</h3>
                <div class="bg-slate-50 p-4 rounded-lg overflow-x-auto">
                    <table class="min-w-full text-left text-sm">
                        <thead>
                            <tr class="border-b border-slate-200 text-slate-500">
                                <th class="py-2">代號</th>
                                <th class="py-2">名稱</th>
                                <th class="py-2 px-2 text-right">數量</th>
                                <th class="py-2 px-2 text-right">單價</th>
                                <th class="py-2 px-2 text-right">小計</th>
                            </tr>
                        </thead>
                        <tbody id="result-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Step 4: Sync -->
        <div id="sync-section" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 opacity-50 pointer-events-none transition-all">
            <h2 class="text-xl font-bold mb-4">Step 4: 同步到雲端</h2>
            <button id="sync-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg transition-all">
                確認無誤，同步寫入 Sheets
            </button>
            <p id="sync-status" class="mt-3 text-center text-sm font-medium text-slate-500"></p>
        </div>
    </div>

    <script>
        const CLIENT_ID = '1059923343074-talm9pe4i4nfleu3gjjrl5la6ijn7ffp.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/generative-language';
        
        let tokenClient;
        let accessToken = null;
        let spreadsheetId = null;
        let currentExtractedData = [];

        // UI Helpers
        const $ = (id) => document.getElementById(id);
        const setOpacity = (id, level) => $(id).style.opacity = level;
        const enable = (id) => $(id).classList.remove('pointer-events-none');
        const show = (id) => $(id).classList.remove('hidden');

        function initTokenClient() {
            if (!window.google || !google.accounts) {
                console.log('Waiting for Google Identity Services...');
                setTimeout(initTokenClient, 500);
                return;
            }
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        accessToken = tokenResponse.access_token;
                        console.log('Access token received');
                        onAuthenticated();
                    }
                },
            });
        }

        $('auth-btn').onclick = () => {
            if (!tokenClient) {
                alert('系統正在加載 Google 登入模組，請稍候 3 秒後再試一次。');
                initTokenClient();
                return;
            }
            tokenClient.requestAccessToken({ prompt: 'consent' });
        };

        async function onAuthenticated() {
            show('user-info');
            $('auth-btn').textContent = '重新授權';
            setOpacity('setup-section', '1');
            enable('setup-section');
            $('setup-text').textContent = '正在檢查試算表...';
            show('setup-loader');

            await setupSpreadsheet();
        }

        async function setupSpreadsheet() {
            const fileName = 'AI_Asset_Butler_Holdings';
            try {
                // 1. Search for existing file
                const searchRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${fileName}' and mimeType='application/vnd.google-apps.spreadsheet' and trashed=false`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const searchData = await searchRes.json();

                if (searchData.files && searchData.files.length > 0) {
                    spreadsheetId = searchData.files[0].id;
                    $('setup-text').textContent = '找到現有試算表！';
                } else {
                    // 2. Create new spreadsheet
                    $('setup-text').textContent = '正在建立新試算表...';
                    const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            name: fileName,
                            mimeType: 'application/vnd.google-apps.spreadsheet'
                        })
                    });
                    const createdFile = await createRes.json();
                    spreadsheetId = createdFile.id;

                    // 3. Set headers
                    await fetch(`https://www.googleapis.com/sheets/v4/spreadsheets/${spreadsheetId}/values/Sheet1!A1:E1?valueInputOption=RAW`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            values: [['代號', '名稱', '數量', '單價', '小計']]
                        })
                    });
                    $('setup-text').textContent = '新試算表建立成功！';
                }

                $('setup-loader').classList.add('hidden');
                show('spreadsheet-link');
                $('spreadsheet-link').querySelector('a').href = `https://docs.google.com/spreadsheets/d/${spreadsheetId}`;
                
                // Unlock recognition
                setOpacity('recognition-section', '1');
                enable('recognition-section');
            } catch (err) {
                console.error(err);
                $('setup-text').textContent = '設定試算表失敗，請重新整理';
            }
        }

        // Image Preview
        $('image-upload').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (re) => {
                    $('image-preview').src = re.target.result;
                    show('preview-container');
                };
                reader.readAsDataURL(file);
            }
        };

        $('recognize-btn').onclick = async () => {
            const file = $('image-upload').files[0];
            if (!file) return alert('請先上傳圖片');

            $('recognize-btn').disabled = true;
            $('recognize-btn').textContent = 'Gemini 正在分析中...';

            const base64Image = await fileToBase64(file);
            const imageData = base64Image.split(',')[1];

            try {
                // Call Gemini via Generative Language API
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "你是一位精通金融資產辨識的 AI。請辨識這張證券或資產截圖中的持股明細。請輸出為 JSON 格式，包含一個陣列 'holdings'，每個物件包含：'symbol' (代號), 'name' (名稱), 'quantity' (數量), 'price' (單價), 'subtotal' (小計)。請務必精準提取數據，若無法辨識則為 null。僅回傳 JSON 代碼塊。" },
                                { inline_data: { mime_type: file.type, data: imageData } }
                            ]
                        }],
                        generationConfig: {
                            response_mime_type: "application/json"
                        }
                    })
                });

                const data = await response.json();
                const content = JSON.parse(data.candidates[0].content.parts[0].text);
                renderResults(content.holdings);
                
                currentExtractedData = content.holdings;
                $('recognize-btn').textContent = '辨識完成';
                
                // Unlock Sync
                setOpacity('sync-section', '1');
                enable('sync-section');
            } catch (err) {
                console.error(err);
                alert('辨識失敗，請檢查網路或 API 權限');
                $('recognize-btn').disabled = false;
                $('recognize-btn').textContent = '開始 AI 辨識';
            }
        };

        function renderResults(holdings) {
            const tbody = $('result-tbody');
            tbody.innerHTML = '';
            holdings.forEach(h => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-50";
                tr.innerHTML = `
                    <td class="py-3 font-medium text-slate-900">${h.symbol || '-'}</td>
                    <td class="py-3">${h.name || '-'}</td>
                    <td class="py-3 px-2 text-right font-mono">${h.quantity || 0}</td>
                    <td class="py-3 px-2 text-right font-mono">${h.price || 0}</td>
                    <td class="py-3 px-2 text-right font-bold text-blue-600 font-mono">${h.subtotal || 0}</td>
                `;
                tbody.appendChild(tr);
            });
            show('recognition-result');
        }

        $('sync-btn').onclick = async () => {
            if (!currentExtractedData.length) return;
            
            $('sync-btn').disabled = true;
            $('sync-btn').textContent = '同步中...';
            
            const values = currentExtractedData.map(h => [
                h.symbol, h.name, h.quantity, h.price, h.subtotal
            ]);

            try {
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet1!A2:E:append?valueInputOption=USER_ENTERED`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        values: values
                    })
                });

                if (response.ok) {
                    $('sync-status').textContent = '✅ 成功同步至雲端試算表！';
                    $('sync-status').className = "mt-3 text-center text-sm font-bold text-green-600";
                    $('sync-btn').textContent = '同步成功';
                } else {
                    throw new Error('Sync failed');
                }
            } catch (err) {
                console.error(err);
                $('sync-status').textContent = '❌ 同步失敗，請稍後再試';
                $('sync-status').className = "mt-3 text-center text-sm font-bold text-red-600";
                $('sync-btn').disabled = false;
            }
        };

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }
    </script>
</body>
</html>
